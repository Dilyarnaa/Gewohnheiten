
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f3eadf">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Habits & To-Dos</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4efe7;
            --panel: rgba(255, 250, 244, 0.82);
            --line: rgba(88, 60, 36, 0.12);
            --text: #2f241c;
            --muted: #756454;
            --blue: #285c8f;
            --green: #2b7a58;
            --red: #9f4d3b;
            --gold: #b37a1c;
            --shadow: 0 22px 48px rgba(63, 42, 24, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px 16px 40px;
            font-family: "Inter", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 32%),
                radial-gradient(circle at top right, rgba(40, 92, 143, 0.12), transparent 28%),
                linear-gradient(160deg, #f9f4ed 0%, #f3eadf 48%, #ece2d6 100%);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            z-index: -1;
            border-radius: 999px;
            filter: blur(18px);
            opacity: 0.7;
        }

        body::before {
            width: 220px;
            height: 220px;
            top: -70px;
            right: -80px;
            background: rgba(40, 92, 143, 0.15);
        }

        body::after {
            width: 180px;
            height: 180px;
            bottom: -50px;
            left: -50px;
            background: rgba(179, 122, 28, 0.14);
        }

        .app-shell {
            max-width: 920px;
            margin: 0 auto;
        }

        .hero,
        .composer,
        .panel-card,
        .habit-card,
        .stat-card,
        .summary-card {
            border: 1px solid rgba(255, 255, 255, 0.55);
            background: var(--panel);
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
        }

        .hero {
            position: relative;
            overflow: hidden;
            padding: 28px;
            margin-bottom: 18px;
            border-radius: 30px;
            background:
                linear-gradient(135deg, rgba(255, 252, 247, 0.96), rgba(242, 231, 217, 0.9)),
                rgba(255, 255, 255, 0.65);
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: auto -90px -90px auto;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(40, 92, 143, 0.14), transparent 62%);
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(110deg, transparent 0 42%, rgba(255, 255, 255, 0.45) 42% 43%, transparent 43% 100%),
                repeating-linear-gradient(90deg, rgba(47, 36, 28, 0.035) 0 1px, transparent 1px 92px);
            opacity: 0.7;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .hero-row {
            position: relative;
            z-index: 1;
            display: grid;
            gap: 22px;
        }

        .hero-top {
            display: flex;
            align-items: start;
            justify-content: space-between;
            gap: 16px;
        }

        .hero h1 {
            margin: 16px 0 0;
            max-width: 660px;
            font-family: "Fraunces", serif;
            font-size: clamp(2.6rem, 5vw, 5rem);
            line-height: 0.92;
            letter-spacing: 0;
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.78);
            color: var(--text);
            text-decoration: none;
            font-size: 1.15rem;
            box-shadow: 0 10px 22px rgba(63, 42, 24, 0.08);
        }

        .hero-stats,
        .summary-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        }

        .stat-card,
        .summary-card {
            padding: 16px;
            border-radius: 20px;
        }

        .stat-card span,
        .summary-label {
            display: block;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 600;
        }

        .stat-card strong,
        .summary-value {
            display: block;
            margin-top: 8px;
            font-size: 1.65rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .tabs {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 16px;
            padding: 10px;
            border-radius: 22px;
            background: rgba(255, 251, 245, 0.68);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 14px 34px rgba(63, 42, 24, 0.09);
            backdrop-filter: blur(14px);
        }

        .btn-tab {
            padding: 15px 16px;
            border: none;
            border-radius: 16px;
            background: transparent;
            color: var(--muted);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.22s ease, background 0.22s ease, color 0.22s ease, box-shadow 0.22s ease;
        }

        .btn-tab.active {
            color: #fff;
            background: linear-gradient(135deg, #2b628f, #3e7aae);
            box-shadow: 0 16px 28px rgba(40, 92, 143, 0.28);
        }

        .section {
            display: none;
            animation: fadeUp 0.35s ease;
        }

        .section.active {
            display: block;
        }

        .summary-grid {
            margin-bottom: 14px;
        }

        .summary-card.accent-blue {
            background: linear-gradient(180deg, rgba(219, 234, 246, 0.92), rgba(255, 252, 247, 0.92));
        }

        .summary-card.accent-green {
            background: linear-gradient(180deg, rgba(223, 243, 232, 0.96), rgba(255, 252, 247, 0.92));
        }

        .summary-card.accent-gold {
            background: linear-gradient(180deg, rgba(247, 237, 211, 0.96), rgba(255, 252, 247, 0.92));
        }

        .section-grid {
            display: grid;
            gap: 14px;
        }

        .composer,
        .panel-card {
            padding: 20px;
            border-radius: 24px;
        }

        .card-title {
            margin: 0 0 14px;
            font-family: "Fraunces", serif;
            font-size: 1.4rem;
            letter-spacing: -0.03em;
        }

        .form-grid {
            display: grid;
            gap: 12px;
            grid-template-columns: 1.2fr 0.8fr;
            margin-bottom: 12px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.82);
            padding: 14px 16px;
            color: var(--text);
            font: inherit;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        input:focus,
        select:focus {
            border-color: rgba(40, 92, 143, 0.45);
            box-shadow: 0 0 0 4px rgba(40, 92, 143, 0.08);
            transform: translateY(-1px);
        }

        .btn-primary,
        .btn-soft,
        .btn-danger,
        .btn-ghost,
        .btn-icon {
            border: none;
            cursor: pointer;
            font: inherit;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .btn-primary,
        .btn-soft,
        .btn-danger {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            font-weight: 700;
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(135deg, #2b628f, #3e7aae);
            box-shadow: 0 16px 28px rgba(40, 92, 143, 0.22);
        }

        .btn-soft {
            color: #fff;
            background: linear-gradient(135deg, #2b7a58, #45956f);
            box-shadow: 0 16px 28px rgba(43, 122, 88, 0.2);
        }

        .btn-danger {
            color: #fff;
            background: linear-gradient(135deg, #9f4d3b, #bd6651);
            box-shadow: 0 16px 28px rgba(159, 77, 59, 0.2);
        }

        .btn-ghost {
            width: auto;
            padding: 11px 14px;
            border-radius: 14px;
            color: var(--text);
            background: rgba(255, 255, 255, 0.72);
            font-weight: 700;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.72);
            color: var(--text);
            font-size: 15px;
            font-weight: 700;
        }

        .btn-delete {
            color: var(--red);
            background: rgba(159, 77, 59, 0.08);
        }

        .list-grid {
            display: grid;
            gap: 12px;
        }

        .habit-card {
            position: relative;
            padding: 20px;
            border-radius: 24px;
        }

        .habit-card::before {
            content: "";
            position: absolute;
            inset: 0 auto 0 0;
            width: 6px;
            border-radius: 24px 0 0 24px;
            background: var(--card-accent, var(--blue));
        }

        .habit-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 12px;
        }

        .habit-title {
            margin: 0;
            font-size: 1.08rem;
            font-weight: 700;
        }

        .habit-meta {
            display: inline-flex;
            margin-top: 8px;
            padding: 7px 11px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 700;
        }

        .habit-value {
            margin: 0 0 14px;
            color: var(--muted);
            line-height: 1.5;
        }

        .habit-actions,
        .todo-actions,
        .inline-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .inline-form input {
            flex: 1;
            min-width: 120px;
            margin: 0;
        }

        .inline-form .btn-soft {
            width: auto;
            min-width: 84px;
        }

        .todo-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid rgba(88, 60, 36, 0.08);
        }

        .todo-row:last-child {
            border-bottom: none;
        }

        .todo-checkbox {
            width: 22px;
            height: 22px;
            accent-color: var(--green);
            cursor: pointer;
        }

        .todo-text {
            font-size: 1rem;
            font-weight: 600;
        }

        .todo-completed .todo-text {
            color: #a49384;
            text-decoration: line-through;
        }

        .empty-state {
            padding: 22px 16px;
            border-radius: 20px;
            text-align: center;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.55);
            border: 1px dashed rgba(88, 60, 36, 0.12);
        }

        .footer-note {
            margin-top: 16px;
            text-align: center;
            color: var(--muted);
            font-size: 0.84rem;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 720px) {
            body {
                padding: 18px 14px 34px;
            }

            .hero,
            .composer,
            .panel-card,
            .habit-card {
                padding: 18px;
            }

            .hero-top,
            .form-grid {
                grid-template-columns: 1fr;
                display: grid;
            }

            .hero-top {
                gap: 12px;
            }

            .todo-row {
                grid-template-columns: auto 1fr;
            }

            .todo-actions {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>
<body>
    <main class="app-shell">
        <section class="hero">
            <div class="hero-row">
                <div class="hero-top">
                    <div>
                        <div class="eyebrow">Habit App</div>
                        <h1>Lebe heute so, wie dein zukünftiges Ich es dir dankt.</h1>
                    </div>
                    <div class="top-actions">
                        <a class="settings-link" href="./sync.html" aria-label="Sync und Einstellungen">⚙</a>
                    </div>
                </div>
                <div class="hero-stats">
                    <div class="stat-card">
                        <span>Habits</span>
                        <strong id="heroHabitCount">0</strong>
                    </div>
                    <div class="stat-card">
                        <span>Offen</span>
                        <strong id="heroTodoOpenCount">0</strong>
                    </div>
                    <div class="stat-card">
                        <span>Fertig</span>
                        <strong id="heroTodoDoneCount">0</strong>
                    </div>
                </div>
            </div>
        </section>

        <nav class="tabs">
            <button id="btnHabits" class="btn-tab active" onclick="switchTab('habits')">Habits</button>
            <button id="btnTodos" class="btn-tab" onclick="switchTab('todos')">To-Dos</button>
        </nav>

        <section id="sectionHabits" class="section active">
            <div class="summary-grid">
                <div class="summary-card accent-blue">
                    <span class="summary-label">Gut</span>
                    <strong class="summary-value" id="goodHabitCount">0</strong>
                </div>
                <div class="summary-card accent-green">
                    <span class="summary-label">Seiten</span>
                    <strong class="summary-value" id="readingHabitPages">0</strong>
                </div>
                <div class="summary-card accent-gold">
                    <span class="summary-label">Timer</span>
                    <strong class="summary-value" id="badHabitCount">0</strong>
                </div>
            </div>

            <div class="section-grid">
                <div class="composer">
                    <h2 class="card-title">Neues Habit</h2>
                    <div class="form-grid">
                        <input type="text" id="habitName" placeholder="Neues Habit">
                        <select id="habitType">
                            <option value="good">Gut</option>
                            <option value="bad">Timer</option>
                            <option value="reading">Lesen</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="addHabit()">Hinzufügen</button>
                </div>

                <div id="habitsContainer" class="list-grid"></div>
            </div>
        </section>

        <section id="sectionTodos" class="section">
            <div class="summary-grid">
                <div class="summary-card accent-blue">
                    <span class="summary-label">Gesamt</span>
                    <strong class="summary-value" id="todoTotalCount">0</strong>
                </div>
                <div class="summary-card accent-green">
                    <span class="summary-label">Fertig</span>
                    <strong class="summary-value" id="todoCompletedCount">0</strong>
                </div>
                <div class="summary-card accent-gold">
                    <span class="summary-label">Offen</span>
                    <strong class="summary-value" id="todoPendingCount">0</strong>
                </div>
            </div>

            <div class="section-grid">
                <div class="composer">
                    <h2 class="card-title">Neues To-Do</h2>
                    <div class="form-grid">
                        <input type="text" id="todoName" placeholder="Neue Aufgabe">
                        <div></div>
                    </div>
                    <button class="btn-primary" onclick="addTodo()">Hinzufügen</button>
                </div>

                <div class="panel-card">
                    <h2 class="card-title">Liste</h2>
                    <div id="todosContainer"></div>
                </div>
            </div>
        </section>

        <p class="footer-note">Lokal gespeichert.</p>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="./firebase-config.js"></script>
    <script>
        const APP_VERSION = "2026-05-02-1";
        let habits = JSON.parse(localStorage.getItem("myHabits")) || [];
        let todos = JSON.parse(localStorage.getItem("myTodos")) || [];
        const deviceId = localStorage.getItem("deviceId") || "device-" + Math.random().toString(36).slice(2, 10);
        localStorage.setItem("deviceId", deviceId);

        let db = null;
        let syncEnabled = false;
        let syncReady = false;
        let syncRoom = localStorage.getItem("syncRoom") || "";
        let syncUnsubscribe = null;
        let lastRemoteTimestamp = 0;
        let syncPushTimer = null;
        let applyingRemoteState = false;

        function setSyncBadge(text) {
            const badge = document.getElementById("syncBadge");
            if (badge) {
                badge.textContent = text;
            }
        }

        function hasFirebaseConfig() {
            return Boolean(
                window.FIREBASE_SYNC_ENABLED &&
                window.FIREBASE_CONFIG &&
                window.FIREBASE_CONFIG.apiKey &&
                window.FIREBASE_CONFIG.authDomain &&
                window.FIREBASE_CONFIG.projectId &&
                window.FIREBASE_CONFIG.appId
            );
        }

        async function initCloudSync() {
            const syncInput = document.getElementById("syncCode");
            if (syncInput) {
                syncInput.value = syncRoom;
            }

            if (!hasFirebaseConfig() || typeof firebase === "undefined") {
                setSyncBadge("Lokal");
                return;
            }

            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(window.FIREBASE_CONFIG);
                }

                await firebase.auth().signInAnonymously();
                db = firebase.firestore();
                syncEnabled = true;
                syncReady = true;
                setSyncBadge(syncRoom ? "Sync an" : "Bereit");

                if (syncRoom) {
                    connectSyncRoom(syncRoom);
                }
            } catch (error) {
                setSyncBadge("Lokal");
            }
        }

        function getRoomId(rawRoom) {
            return rawRoom.trim().toLowerCase().replace(/[^a-z0-9_-]/g, "").slice(0, 40);
        }

        function getSyncDoc(room) {
            return db.collection("habitSyncRooms").doc(room);
        }

        function connectSyncRoom(room) {
            if (!syncEnabled || !db || !room) {
                return;
            }

            if (syncUnsubscribe) {
                syncUnsubscribe();
                syncUnsubscribe = null;
            }

            syncRoom = room;
            localStorage.setItem("syncRoom", syncRoom);
            setSyncBadge("Sync an");

            syncUnsubscribe = getSyncDoc(syncRoom).onSnapshot((snapshot) => {
                if (!snapshot.exists) {
                    pushStateToCloud(true);
                    return;
                }

                const data = snapshot.data();
                const remoteTimestamp = data.updatedAt || 0;

                if (data.lastEditedBy === deviceId || remoteTimestamp <= lastRemoteTimestamp) {
                    return;
                }

                lastRemoteTimestamp = remoteTimestamp;
                applyingRemoteState = true;
                habits = Array.isArray(data.habits) ? data.habits : [];
                todos = Array.isArray(data.todos) ? data.todos : [];
                sortTodos();
                localStorage.setItem("myHabits", JSON.stringify(habits));
                localStorage.setItem("myTodos", JSON.stringify(todos));
                renderHabits();
                renderTodos();
                updateHeroStats();
                applyingRemoteState = false;
            });
        }

        function disconnectSyncRoom() {
            if (syncUnsubscribe) {
                syncUnsubscribe();
                syncUnsubscribe = null;
            }
            syncRoom = "";
            localStorage.removeItem("syncRoom");
            const syncInput = document.getElementById("syncCode");
            if (syncInput) {
                syncInput.value = "";
            }
            setSyncBadge(syncEnabled ? "Bereit" : "Lokal");
        }

        function toggleSyncConnection() {
            const syncInput = document.getElementById("syncCode");
            const room = getRoomId(syncInput ? syncInput.value : "");

            if (!syncEnabled) {
                setSyncBadge("Lokal");
                return;
            }

            if (syncRoom && room === syncRoom) {
                disconnectSyncRoom();
                return;
            }

            if (!room) {
                setSyncBadge("Code fehlt");
                return;
            }

            connectSyncRoom(room);
            pushStateToCloud(true);
        }

        function queueCloudSync() {
            if (!syncEnabled || !syncReady || !syncRoom || applyingRemoteState) {
                return;
            }

            clearTimeout(syncPushTimer);
            syncPushTimer = setTimeout(() => {
                pushStateToCloud(false);
            }, 250);
        }

        async function pushStateToCloud(force) {
            if (!syncEnabled || !db || !syncRoom || applyingRemoteState) {
                return;
            }

            try {
                const payload = {
                    habits,
                    todos,
                    updatedAt: Date.now(),
                    lastEditedBy: deviceId,
                    version: APP_VERSION
                };

                lastRemoteTimestamp = payload.updatedAt;
                await getSyncDoc(syncRoom).set(payload, { merge: !force });
                setSyncBadge("Sync an");
            } catch (error) {
                setSyncBadge("Offline");
            }
        }

        async function registerAppShell() {
            if (!("serviceWorker" in navigator) || location.protocol === "file:") {
                setSyncBadge("Lokal");
                return;
            }

            try {
                const registration = await navigator.serviceWorker.register("./sw.js?v=" + APP_VERSION, { scope: "./" });
                setSyncBadge("Aktuell");

                if (navigator.serviceWorker.controller) {
                    registration.update().catch(() => {});
                }

                navigator.serviceWorker.addEventListener("controllerchange", () => {
                    if (window.__appReloading) {
                        return;
                    }
                    window.__appReloading = true;
                    setSyncBadge("Neu");
                    window.location.reload();
                });

                document.addEventListener("visibilitychange", () => {
                    if (document.visibilityState === "visible") {
                        registration.update().catch(() => {});
                    }
                });

                window.addEventListener("online", () => {
                    setSyncBadge("Prüfe");
                    registration.update().catch(() => {});
                });

                setInterval(() => {
                    registration.update().catch(() => {});
                }, 60000);
            } catch (error) {
                setSyncBadge("Offline");
            }
        }

        function switchTab(tabName) {
            const habitsSection = document.getElementById("sectionHabits");
            const todosSection = document.getElementById("sectionTodos");
            const habitsButton = document.getElementById("btnHabits");
            const todosButton = document.getElementById("btnTodos");

            if (tabName === "habits") {
                habitsSection.classList.add("active");
                todosSection.classList.remove("active");
                habitsButton.classList.add("active");
                todosButton.classList.remove("active");
            } else {
                todosSection.classList.add("active");
                habitsSection.classList.remove("active");
                todosButton.classList.add("active");
                habitsButton.classList.remove("active");
            }
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function getHabitMeta(type) {
            if (type === "good") {
                return { label: "Gut", accent: "var(--blue)" };
            }

            if (type === "reading") {
                return { label: "Lesen", accent: "var(--green)" };
            }

            return { label: "Timer", accent: "var(--red)" };
        }

        function formatDuration(startTime) {
            const diffMinutes = Math.floor((Date.now() - startTime) / (1000 * 60));
            const hours = Math.floor(diffMinutes / 60);
            const days = Math.floor(hours / 24);
            return days > 0
                ? days + " T, " + (hours % 24) + " Std"
                : hours + " Std, " + (diffMinutes % 60) + " Min";
        }

        function updateHeroStats() {
            const completedTodos = todos.filter((todo) => todo.completed).length;
            document.getElementById("heroHabitCount").textContent = habits.length;
            document.getElementById("heroTodoOpenCount").textContent = todos.length - completedTodos;
            document.getElementById("heroTodoDoneCount").textContent = completedTodos;

            document.getElementById("goodHabitCount").textContent = habits.filter((habit) => habit.type === "good").length;
            document.getElementById("readingHabitPages").textContent = habits
                .filter((habit) => habit.type === "reading")
                .reduce((sum, habit) => sum + (habit.totalPages || 0), 0);
            document.getElementById("badHabitCount").textContent = habits.filter((habit) => habit.type === "bad").length;

            document.getElementById("todoTotalCount").textContent = todos.length;
            document.getElementById("todoCompletedCount").textContent = completedTodos;
            document.getElementById("todoPendingCount").textContent = todos.length - completedTodos;
        }

        function sortTodos() {
            todos.sort((a, b) => {
                if (a.completed === b.completed) {
                    return a.id - b.id;
                }
                return a.completed ? 1 : -1;
            });
        }

        function saveHabits() {
            localStorage.setItem("myHabits", JSON.stringify(habits));
            renderHabits();
            updateHeroStats();
            queueCloudSync();
        }

        function saveTodos() {
            sortTodos();
            localStorage.setItem("myTodos", JSON.stringify(todos));
            renderTodos();
            updateHeroStats();
            queueCloudSync();
        }

        function addHabit() {
            const nameInput = document.getElementById("habitName");
            const typeInput = document.getElementById("habitType");
            const name = nameInput.value.trim();

            if (!name) {
                return;
            }

            habits.push({
                id: Date.now(),
                name: name,
                type: typeInput.value,
                count: 0,
                totalPages: 0,
                startTime: Date.now()
            });

            nameInput.value = "";
            saveHabits();
        }

        function moveHabit(id, direction) {
            const index = habits.findIndex((habit) => habit.id === id);

            if (direction === -1 && index > 0) {
                const temp = habits[index - 1];
                habits[index - 1] = habits[index];
                habits[index] = temp;
                saveHabits();
            } else if (direction === 1 && index < habits.length - 1) {
                const temp = habits[index + 1];
                habits[index + 1] = habits[index];
                habits[index] = temp;
                saveHabits();
            }
        }

        function addPages(id) {
            const inputField = document.getElementById("input-" + id);
            const pagesToAdd = parseInt(inputField.value, 10);

            if (Number.isNaN(pagesToAdd) || pagesToAdd <= 0) {
                return;
            }

            const habit = habits.find((entry) => entry.id === id);
            habit.totalPages += pagesToAdd;
            inputField.value = "";
            saveHabits();
        }

        function increaseCount(id) {
            const habit = habits.find((entry) => entry.id === id);
            habit.count += 1;
            saveHabits();
        }

        function resetTimer(id) {
            const habit = habits.find((entry) => entry.id === id);
            habit.startTime = Date.now();
            saveHabits();
        }

        function deleteHabit(id) {
            habits = habits.filter((habit) => habit.id !== id);
            saveHabits();
        }

        function renderHabits() {
            const container = document.getElementById("habitsContainer");

            if (habits.length === 0) {
                container.innerHTML = '<div class="empty-state">Noch keine Habits.</div>';
                return;
            }

            container.innerHTML = "";

            habits.forEach((habit) => {
                const meta = getHabitMeta(habit.type);
                const card = document.createElement("article");
                card.className = "habit-card";
                card.style.setProperty("--card-accent", meta.accent);

                let contentHtml = "";

                if (habit.type === "good") {
                    contentHtml = `
                        <p class="habit-value"><strong>${habit.count}</strong> Mal</p>
                        <div class="habit-actions">
                            <button class="btn-soft" onclick="increaseCount(${habit.id})">+1</button>
                        </div>
                    `;
                } else if (habit.type === "reading") {
                    contentHtml = `
                        <p class="habit-value"><strong>${habit.totalPages}</strong> Seiten</p>
                        <div class="inline-form">
                            <input type="number" id="input-${habit.id}" placeholder="Seiten">
                            <button class="btn-soft" onclick="addPages(${habit.id})">Speichern</button>
                        </div>
                    `;
                } else {
                    contentHtml = `
                        <p class="habit-value"><strong>${formatDuration(habit.startTime)}</strong></p>
                        <div class="habit-actions">
                            <button class="btn-danger" onclick="resetTimer(${habit.id})">Reset</button>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="habit-head">
                        <div>
                            <h3 class="habit-title">${escapeHtml(habit.name)}</h3>
                            <div class="habit-meta">${meta.label}</div>
                        </div>
                        <div class="habit-actions">
                            <button class="btn-icon" onclick="moveHabit(${habit.id}, -1)" aria-label="Nach oben">↑</button>
                            <button class="btn-icon" onclick="moveHabit(${habit.id}, 1)" aria-label="Nach unten">↓</button>
                        </div>
                    </div>
                    ${contentHtml}
                    <div class="habit-actions" style="margin-top: 12px;">
                        <button class="btn-ghost btn-delete" onclick="deleteHabit(${habit.id})">Löschen</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        function addTodo() {
            const todoInput = document.getElementById("todoName");
            const text = todoInput.value.trim();

            if (!text) {
                return;
            }

            todos.push({
                id: Date.now(),
                text: text,
                completed: false
            });

            todoInput.value = "";
            saveTodos();
        }

        function moveTodo(id, direction) {
            const index = todos.findIndex((todo) => todo.id === id);

            if (direction === -1 && index > 0) {
                const temp = todos[index - 1];
                todos[index - 1] = todos[index];
                todos[index] = temp;
                saveTodos();
            } else if (direction === 1 && index < todos.length - 1) {
                const temp = todos[index + 1];
                todos[index + 1] = todos[index];
                todos[index] = temp;
                saveTodos();
            }
        }

        function toggleTodo(id) {
            const todo = todos.find((entry) => entry.id === id);
            todo.completed = !todo.completed;
            saveTodos();
        }

        function deleteTodo(id) {
            todos = todos.filter((todo) => todo.id !== id);
            saveTodos();
        }

        function renderTodos() {
            const container = document.getElementById("todosContainer");

            if (todos.length === 0) {
                container.innerHTML = '<div class="empty-state">Noch keine To-Dos.</div>';
                return;
            }

            container.innerHTML = "";

            todos.forEach((todo) => {
                const row = document.createElement("div");
                row.className = "todo-row" + (todo.completed ? " todo-completed" : "");
                row.innerHTML = `
                    <input type="checkbox" class="todo-checkbox" ${todo.completed ? "checked" : ""} onchange="toggleTodo(${todo.id})">
                    <span class="todo-text">${escapeHtml(todo.text)}</span>
                    <div class="todo-actions">
                        <button class="btn-icon" onclick="moveTodo(${todo.id}, -1)" aria-label="Nach oben">↑</button>
                        <button class="btn-icon" onclick="moveTodo(${todo.id}, 1)" aria-label="Nach unten">↓</button>
                        <button class="btn-icon btn-delete" onclick="deleteTodo(${todo.id})" aria-label="Löschen">×</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        renderHabits();
        renderTodos();
        updateHeroStats();
        registerAppShell();
        initCloudSync();
        setInterval(renderHabits, 60000);
    </script>
</body>
</html>
