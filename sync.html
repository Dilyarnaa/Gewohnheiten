
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f3eadf">
    <title>Sync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --panel: rgba(255, 250, 244, 0.86);
            --line: rgba(88, 60, 36, 0.12);
            --text: #2f241c;
            --muted: #756454;
            --blue: #285c8f;
            --shadow: 0 22px 48px rgba(63, 42, 24, 0.12);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px 16px 40px;
            font-family: "Inter", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.85), transparent 32%),
                radial-gradient(circle at top right, rgba(40, 92, 143, 0.12), transparent 28%),
                linear-gradient(160deg, #f9f4ed 0%, #f3eadf 48%, #ece2d6 100%);
        }

        .shell {
            max-width: 720px;
            margin: 0 auto;
        }

        .card {
            padding: 22px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            background: var(--panel);
            backdrop-filter: blur(16px);
            box-shadow: var(--shadow);
        }

        .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.8);
            color: var(--text);
            text-decoration: none;
            font-size: 1.1rem;
        }

        h1 {
            margin: 0 0 8px;
            font-family: "Fraunces", serif;
            font-size: 2rem;
            letter-spacing: -0.03em;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        .status {
            margin-top: 14px;
            display: inline-flex;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.78);
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .form {
            margin-top: 18px;
            display: grid;
            gap: 12px;
        }

        input {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.82);
            padding: 14px 16px;
            color: var(--text);
            font: inherit;
            outline: none;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button, .secondary {
            border: none;
            cursor: pointer;
            font: inherit;
            padding: 14px 16px;
            border-radius: 16px;
            font-weight: 700;
        }

        .primary {
            color: #fff;
            background: linear-gradient(135deg, #2b628f, #3e7aae);
        }

        .secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            background: rgba(255, 255, 255, 0.78);
            text-decoration: none;
        }

        .hint {
            margin-top: 16px;
            font-size: 0.92rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="card">
            <div class="top">
                <a class="back" href="./index.html" aria-label="Zurück">←</a>
            </div>
            <h1>Sync</h1>
            <p>Gib auf allen Geräten denselben Code ein.</p>
            <div id="status" class="status">Lokal</div>

            <div class="form">
                <input type="text" id="syncCode" placeholder="Zum Beispiel dilyar-sync">
                <div class="actions">
                    <button class="primary" onclick="saveSyncCode()">Speichern</button>
                    <button class="secondary" onclick="clearSyncCode()">Trennen</button>
                </div>
            </div>

            <p class="hint">Danach die Hauptseite auf allen Geräten öffnen.</p>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="./firebase-config.js"></script>
    <script>
        const deviceId = localStorage.getItem("deviceId") || "device-" + Math.random().toString(36).slice(2, 10);
        localStorage.setItem("deviceId", deviceId);

        function setStatus(text) {
            const status = document.getElementById("status");
            if (status) {
                status.textContent = text;
            }
        }

        function getRoomId(rawRoom) {
            return rawRoom.trim().toLowerCase().replace(/[^a-z0-9_-]/g, "").slice(0, 40);
        }

        function loadCurrentCode() {
            const input = document.getElementById("syncCode");
            const current = localStorage.getItem("syncRoom") || "";
            input.value = current;
            setStatus(current ? "Sync an" : "Lokal");
        }

        async function saveSyncCode() {
            const input = document.getElementById("syncCode");
            const room = getRoomId(input.value);

            if (!room) {
                setStatus("Code fehlt");
                return;
            }

            localStorage.setItem("syncRoom", room);

            if (!window.FIREBASE_SYNC_ENABLED || typeof firebase === "undefined") {
                setStatus("Gespeichert");
                return;
            }

            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(window.FIREBASE_CONFIG);
                }

                await firebase.auth().signInAnonymously();
                const db = firebase.firestore();
                await db.collection("habitSyncRooms").doc(room).set({
                    updatedAt: Date.now(),
                    lastEditedBy: deviceId
                }, { merge: true });
                setStatus("Sync an");
            } catch (error) {
                setStatus("Offline");
            }
        }

        function clearSyncCode() {
            localStorage.removeItem("syncRoom");
            document.getElementById("syncCode").value = "";
            setStatus("Lokal");
        }

        loadCurrentCode();
    </script>
</body>
</html>
